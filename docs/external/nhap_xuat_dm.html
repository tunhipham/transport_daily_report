<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sản Lượng Nhập Xuất — ABA Đông Mát T4/2026</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0b0d12;
  --bg2: #111420;
  --bg3: #181c2a;
  --bg-head: #0d1020;
  --bg-row1: #12152200;
  --bg-row2: rgba(255,255,255,0.015);
  --border: #1e2236;
  --border-cat: #2a2f48;
  --txt: #d8dce6;
  --txt2: #7d849c;
  --txt3: #4e5470;
  /* Unified colors */
  --label-cat: #d8dce6;
  --label-info: #d8dce6;
  --num: #22d3ee;
  --num-hi: #22d3ee;
  --num-fc: #22d3ee;
  /* Percentage */
  --pct-good: #22d3ee;
  --pct-warn: #22d3ee;
  --pct-bad: #22d3ee;
  --pct-over: #22d3ee;
  /* Highlight */
  --cyan: #22d3ee;
  --cyan-bg: rgba(34,211,238,0.10);
  --yellow: #fde047;
  --yellow-bg: rgba(253,224,71,0.12);
  --green: #22d3ee;
  --red: #22d3ee;
  --blue: #60a5fa;
  --purple: #a78bfa;
  --pick-ok: #22d3ee;
  --pick-warn: #22d3ee;
  --pick-bad: #22d3ee;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--txt);
  min-height:100vh;
  padding-bottom:60px;
}

/* Header */
.header {
  background:linear-gradient(135deg,#0f1328,#141938);
  border-bottom:1px solid var(--border);
  padding:22px 28px 18px;
  text-align:center;
}
.header h1 {
  font-size:18px; font-weight:800; letter-spacing:0.5px;
  background:linear-gradient(90deg,#e2e5eb,#9aa0b0);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
.header .sub { color:#ef4444; font-size:14px; font-weight:700; margin-top:4px; }

/* Day Nav */
.day-nav {
  display:flex; align-items:center; justify-content:center; gap:20px;
  padding:14px 28px;
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  position:sticky; top:0; z-index:50;
  backdrop-filter:blur(8px);
}
.day-nav button {
  background:var(--bg3); border:1px solid var(--border); color:var(--txt);
  padding:9px 20px; border-radius:8px; font-family:'Inter'; font-size:13px;
  font-weight:600; cursor:pointer; transition:all .2s;
}
.day-nav button:hover { background:#252a40; border-color:var(--cyan); color:var(--cyan); }
.day-nav button:disabled { opacity:.25; cursor:default; }
.day-info { text-align:center; min-width:200px; }
.day-info .date { font-size:22px; font-weight:800; color:var(--cyan); }
.day-info .dow { font-size:13px; color:var(--txt2); margin-top:2px; }
.day-info .week {
  font-size:10px; color:var(--bg); margin-top:4px;
  background:var(--cyan); padding:2px 10px; border-radius:10px;
  display:inline-block; font-weight:700; letter-spacing:0.5px;
}

/* Table */
.table-block {
  margin:16px auto;
  max-width:920px;
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 4px 24px rgba(0,0,0,0.25);
}
.table-title {
  padding:10px 16px;
  font-size:13px; font-weight:700;
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:8px;
  background:rgba(255,255,255,0.02);
  color:var(--txt);
}
table {
  width:100%; border-collapse:collapse; font-size:12px;
  table-layout:fixed;
}

/* Column widths */
col.col-cat    { width:115px; }
col.col-info   { width:115px; }
col.col-num    { width:82px; }
col.col-pct    { width:82px; }
col.col-qclh   { width:68px; }

thead th {
  background:var(--bg-head);
  color:var(--txt2);
  font-weight:600; font-size:10px;
  text-transform:uppercase; letter-spacing:0.5px;
  padding:6px 8px;
  text-align:right;
  border-bottom:2px solid var(--border-cat);
  white-space:nowrap;
  overflow:hidden;
}
th.h-cat, th.h-info { text-align:left; }
th.h-cat { padding-left:12px; }
th.date-head {
  background:linear-gradient(135deg,#0c3d5e,#134050);
  color:var(--cyan);
  font-size:13px; font-weight:700;
  text-align:center;
  letter-spacing:0;
  text-transform:none;
  padding:8px 6px;
}

tbody td {
  padding:5px 8px;
  border-bottom:1px solid rgba(30,34,54,0.6);
  text-align:right;
  font-variant-numeric:tabular-nums;
  white-space:nowrap;
  height:30px;
  vertical-align:middle;
  overflow:hidden;
}

/* Class-based column styling (fixes rowspan alignment) */
.c-cat { text-align:left !important; font-weight:700; color:var(--txt); padding-left:12px !important; font-size:11.5px; letter-spacing:0.2px; }
.c-info { text-align:left !important; color:var(--txt); font-weight:500; font-size:11px; }
.c-bk { color:var(--cyan); font-weight:600; }
.c-fc { color:var(--cyan); font-weight:500; }
.c-pct { color:var(--cyan); font-weight:600; }
.c-ql { color:var(--cyan); font-weight:600; }
.c-bt { color:var(--cyan); font-weight:500; }
.c-tx { color:var(--cyan); font-weight:600; }
.c-pk { color:var(--cyan); font-weight:600; }
.c-empty { color:var(--txt3); }

/* Hover */
tbody tr:hover td { background:rgba(94,234,212,0.04) !important; }

/* Category group separator */
tbody tr.cat-first td { border-top:2px solid var(--border-cat); }
tbody tr.cat-first td.c-cat { border-top-color:var(--label-cat); }

/* Zebra per row within category group */
tbody tr.row-2 td { background:var(--bg-row2); }
tbody tr.row-3 td { background:rgba(255,255,255,0.025); }

/* Summary rows */
tbody tr.summary td {
  background:rgba(96,165,250,0.05) !important;
  font-weight:700;
  border-bottom:1px solid rgba(96,165,250,0.15);
}
tbody tr.summary.cat-first td {
  border-top:3px solid var(--blue);
}
tbody tr.summary td.c-cat {
  color:var(--txt) !important;
  font-size:12.5px;
}
tbody tr.summary td.c-info {
  color:var(--txt) !important;
  font-weight:600;
  font-style:italic;
}
tbody tr.summary td.c-bk { color:var(--cyan) !important; }
tbody tr.summary td.c-tx { color:var(--cyan) !important; }

/* Highlight cells */
.hl-cyan {
  background:var(--cyan-bg) !important;
  color:var(--cyan) !important;
  font-weight:700;
  border-radius:4px;
}
.hl-yellow {
  background:var(--cyan-bg) !important;
  color:var(--cyan) !important;
  font-weight:700;
  border-radius:4px;
}
.pct-warn {
  background:rgba(253,224,71,0.18) !important;
  color:#fde047 !important;
  font-weight:700;
}
.pct-normal {
  color:var(--cyan) !important;
  font-weight:600;
}

/* Pick rot coloring */
.pick-ok  { color:var(--cyan); }
.pick-warn { background:rgba(253,224,71,0.18) !important; color:#fde047 !important; font-weight:700; }

/* Empty cell */
.empty-cell { color:var(--txt3); }

/* Off day */
.off-msg {
  padding:50px; text-align:center; color:var(--txt3); font-size:16px; font-style:italic;
}

/* Footer legend */
.legend {
  display:flex; gap:24px; justify-content:center; padding:18px;
  font-size:11px; color:var(--txt3);
  flex-wrap:wrap;
}
.legend span { display:flex; align-items:center; gap:6px; }
.legend .dot { width:10px; height:10px; border-radius:3px; display:inline-block; }

::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:#2a2f48; border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:#3a3f58; }

@keyframes fadeIn {
  from { opacity:0; transform:translateY(6px); }
  to { opacity:1; transform:translateY(0); }
}
.table-block { animation:fadeIn 0.3s ease; }

/* Bảng 3 - Chi tiết */
.detail-block { max-width:1260px !important; }
.detail-block .detail-wrap { overflow-x:auto; }
.detail-table { font-size:11px; table-layout:fixed !important; width:100%; min-width:1200px; }
.detail-table thead th {
  font-size:9px; padding:6px 5px;
  background:linear-gradient(135deg,#0c3d5e,#134050);
  color:var(--cyan); font-weight:700;
  border-bottom:2px solid rgba(34,211,238,0.3);
  text-transform:uppercase; letter-spacing:0.3px;
  white-space:nowrap;
}
.detail-table thead th:first-child { text-align:center; width:28px; }
.detail-table thead th.th-cat { text-align:left; width:78px; }
.detail-table thead th.th-temp { text-align:center; width:44px; }
.detail-table thead th.th-code { text-align:left; width:72px; }
.detail-table thead th.th-name { text-align:left; width:auto; }
.detail-table thead th.th-unit { text-align:center; width:40px; }
.detail-table thead th.th-num { width:68px; }
.detail-table thead th.th-note { text-align:left; width:120px; }
.detail-table thead th.th-tf { width:38px; }
.detail-table thead th.th-pct { width:68px; }
.detail-table tbody td {
  padding:5px 5px; height:30px;
  border-bottom:1px solid rgba(30,34,54,0.7);
  overflow:hidden; text-overflow:ellipsis;
}
.detail-table tbody td:first-child { text-align:center; color:var(--txt); font-size:10px; font-weight:600; }
.detail-table tbody td.d-cat { text-align:left; font-size:10px; color:var(--txt); font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.detail-table tbody td.d-temp { text-align:center; font-size:9.5px; font-weight:700; color:var(--txt); }
.detail-table tbody td.d-code { text-align:left; font-size:9px; color:var(--txt); font-weight:500; overflow:hidden; text-overflow:ellipsis; }
.detail-table tbody td.d-name { text-align:left; color:var(--txt); font-size:10.5px; font-weight:500; white-space:normal; }
.detail-table tbody td.d-unit { text-align:center; color:var(--txt); font-size:9.5px; }
.d-bk { color:var(--cyan) !important; font-weight:700; }
.d-tx { color:var(--cyan) !important; font-weight:600; }
.d-qcr { color:var(--cyan) !important; font-weight:500; }
.d-hold { color:var(--cyan) !important; font-weight:500; }
.d-diff { color:var(--cyan) !important; font-weight:700; }
.d-note { color:var(--txt) !important; font-weight:700; font-size:10px !important; text-align:left !important; }
.d-tf { color:var(--txt) !important; font-size:9px !important; font-weight:600; }
.d-pct-good { color:var(--cyan) !important; font-weight:600; }
.d-pct-warn { color:var(--cyan) !important; font-weight:700; }
.d-pct-bad { color:var(--cyan) !important; font-weight:700; }
.detail-table tbody tr:nth-child(odd) td { background:rgba(255,255,255,0.018); }
.detail-table tbody tr:nth-child(even) td { background:rgba(14,17,30,0.5); }
.detail-table tbody tr:hover td { background:rgba(94,234,212,0.06) !important; }
.detail-total td { background:rgba(96,165,250,0.06) !important; font-weight:700 !important; border-top:1px solid rgba(96,165,250,0.2); }
.detail-total td.d-name { color:var(--blue) !important; font-style:italic; }
.summary-cards { display:flex; gap:12px; padding:12px 0 8px; flex-wrap:wrap; justify-content:center; }
.s-card {
  background:linear-gradient(135deg, rgba(24,28,42,0.95), rgba(17,20,32,0.95));
  border:1.5px solid var(--border);
  border-radius:10px; padding:10px 18px; text-align:center; min-width:110px;
  transition:transform 0.2s, box-shadow 0.2s;
}
.s-card:hover { transform:translateY(-2px); }
.s-card .s-label { font-size:9px; text-transform:uppercase; letter-spacing:0.6px; color:var(--txt2); font-weight:700; }
.s-card .s-val { font-size:18px; font-weight:800; margin-top:3px; font-variant-numeric:tabular-nums; }

/* SKU rớt — purple */
.s-card.sc-sku { border-color:rgba(167,139,250,0.5); box-shadow:0 0 12px rgba(167,139,250,0.15); }
.s-card.sc-sku .s-val { color:#c4b5fd; text-shadow:0 0 8px rgba(167,139,250,0.4); }

/* Booking — cyan */
.s-card.sc-bk { border-color:rgba(34,211,238,0.5); box-shadow:0 0 12px rgba(34,211,238,0.15); }
.s-card.sc-bk .s-val { color:#22d3ee; text-shadow:0 0 8px rgba(34,211,238,0.4); }

/* Thực xuất — green */
.s-card.sc-tx { border-color:rgba(52,211,153,0.5); box-shadow:0 0 12px rgba(52,211,153,0.15); }
.s-card.sc-tx .s-val { color:#34d399; text-shadow:0 0 8px rgba(52,211,153,0.4); }

/* Chênh lệch — orange/amber */
.s-card.sc-diff { border-color:rgba(251,146,60,0.5); box-shadow:0 0 12px rgba(251,146,60,0.15); }
.s-card.sc-diff .s-val { color:#fb923c; text-shadow:0 0 8px rgba(251,146,60,0.4); }

/* %TX/BK — yellow */
.s-card.sc-pct { border-color:rgba(253,224,71,0.5); box-shadow:0 0 12px rgba(253,224,71,0.15); }
.s-card.sc-pct .s-val { color:#fde047; text-shadow:0 0 8px rgba(253,224,71,0.4); }
.badge-cat { font-size:9px; padding:2px 8px; border-radius:8px; font-weight:700; margin-left:6px; }
.badge-lh { background:rgba(167,139,250,0.15); color:var(--purple); }
.badge-qc { background:rgba(251,191,36,0.15); color:var(--yellow); }
.badge-tcnk { background:rgba(251,146,60,0.15); color:#fb923c; }

/* Bảng 4 - Warning */
.warn-block { max-width:1260px !important; }
.warn-block .warn-title-bar {
  padding:10px 16px;
  font-size:13px; font-weight:700;
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:8px;
  background:rgba(239,68,68,0.06);
  color:#f87171;
}
.warn-table { width:100%; border-collapse:collapse; font-size:11.5px; table-layout:fixed; }
.warn-table thead th {
  font-size:10px; padding:8px 6px;
  background:linear-gradient(135deg,#3b1320,#2d1018);
  color:#f87171; font-weight:700;
  border-bottom:2px solid rgba(248,113,113,0.3);
  text-transform:uppercase; letter-spacing:0.4px;
  white-space:nowrap;
  text-align:center;
}
.warn-table thead th:first-child { width:32px; }
.warn-table thead th.wt-code { width:110px; }
.warn-table thead th.wt-name { width:auto; }
.warn-table thead th.wt-cat { width:85px; }
.warn-table thead th.wt-num { width:72px; }
.warn-table thead th.wt-days { width:56px; }
.warn-table tbody td {
  padding:6px 8px; height:32px;
  border-bottom:1px solid rgba(248,113,113,0.1);
  overflow:hidden; text-overflow:ellipsis;
  white-space:nowrap;
  font-variant-numeric:tabular-nums;
  vertical-align:middle;
}
.warn-table tbody td:first-child { text-align:center; color:var(--txt); font-size:11px; font-weight:700; vertical-align:middle; }
.warn-table tbody td.wc-code { text-align:left; font-size:10.5px; color:var(--txt); font-weight:600; vertical-align:middle; }
.warn-table tbody td.wc-name { text-align:left; color:var(--txt); font-size:11px; font-weight:500; white-space:normal; vertical-align:middle; }
.warn-table tbody td.wc-cat { text-align:center; font-size:10.5px; color:var(--txt); font-weight:500; vertical-align:middle; }
.warn-table tbody td.wc-num { text-align:center; color:var(--cyan); font-weight:700; font-size:11px; }
.warn-table tbody td.wc-days {
  text-align:center; font-weight:800; font-size:15px; vertical-align:middle;
}
.wc-days-3 { color:#fb923c; }
.wc-days-4 { color:#f87171; }
.wc-days-5 { color:#ef4444; text-shadow:0 0 8px rgba(239,68,68,0.5); }
.warn-table tbody td.wc-dates { text-align:center; font-size:11px; color:#93c5fd; font-weight:600; }
.warn-table tbody tr:nth-child(odd) td { background:rgba(248,113,113,0.03); }
.warn-table tbody tr:nth-child(even) td { background:rgba(14,17,30,0.5); }
.warn-table tbody tr:hover td { background:rgba(248,113,113,0.08) !important; }
/* Separator between SKU groups */
.warn-table tbody tr.warn-group-first td { border-top:2px solid rgba(248,113,113,0.25); }
.warn-badge {
  display:inline-block; padding:3px 10px; border-radius:10px;
  font-size:11px; font-weight:800;
  background:rgba(248,113,113,0.15); color:#f87171;
  margin-left:8px;
}
/* Tab navigation */
.tab-nav {
  display:flex; justify-content:center; gap:0;
  padding:0; background:var(--bg2);
  border-bottom:1px solid var(--border);
}
.tab-btn {
  padding:12px 36px; font-family:'Inter'; font-size:14px; font-weight:700;
  background:transparent; border:none; color:var(--txt2); cursor:pointer;
  border-bottom:3px solid transparent; transition:all .2s;
  letter-spacing:0.3px;
}
.tab-btn:hover { color:var(--txt); background:rgba(255,255,255,0.03); }
.tab-btn.active { color:var(--cyan); border-bottom-color:var(--cyan); }
.tab-btn.active-nhap { color:#f59e0b; border-bottom-color:#f59e0b; }
.tab-btn.active-du { color:#10b981; border-bottom-color:#10b981; }
/* Import table header */
.nh-head { background:linear-gradient(135deg,#3d2e0c,#2d2108) !important; color:#f59e0b !important; }
.date-head-nh { background:linear-gradient(90deg,#3d2e0c,#2d2108) !important; color:#fbbf24 !important; }
/* Nhập compact layout */
.nh-compact { max-width:680px !important; }
.nh-compact table { table-layout:fixed; }
.nh-compact tbody td { height:26px; padding:3px 6px; font-size:11.5px; }
.nh-compact thead th { padding:5px 6px; font-size:9.5px; }
.nh-compact .c-cat { font-size:11px; padding-left:10px !important; }
.nh-compact .c-info { font-size:10.5px; }
.nh-compact .table-title { padding:8px 14px; font-size:12px; }
.nh-cards { max-width:680px !important; margin:10px auto !important; padding:10px 12px !important; }
.nh-cards .s-card { min-width:100px !important; padding:7px 12px !important; }
.nh-cards .s-card .s-label { font-size:8px !important; }
.nh-cards .s-card .s-val { font-size:15px !important; }
</style>
</head>
<body>

<div class="header">
  <h1>BÁO CÁO SẢN LƯỢNG ABA ĐÔNG MÁT T4 2026</h1>
  <div class="sub" id="headerSub">XUẤT HÀNG</div>
</div>

<div class="tab-nav">
  <button class="tab-btn active" id="tabXuat" onclick="switchTab('xuat')">📦 XUẤT HÀNG</button>
  <button class="tab-btn" id="tabNhap" onclick="switchTab('nhap')">📥 NHẬP HÀNG</button>
  <button class="tab-btn" id="tabDapUng" onclick="switchTab('dapung')">📈 TỶ LỆ ĐÁP ỨNG</button>
</div>

<div class="day-nav">
  <button onclick="prev()" id="btnPrev">◀ Trước</button>
  <div class="day-info">
    <div class="date" id="navDate"></div>
    <div class="dow" id="navDow"></div>
    <div class="week" id="navWeek"></div>
  </div>
  <button onclick="next()" id="btnNext">Sau ▶</button>
</div>

<div id="content"></div>

<div class="legend">
  <span><span class="dot" style="background:var(--cyan-bg);border:1px solid var(--cyan)"></span> %Bk/FC ≥ 100%</span>
  <span><span class="dot" style="background:var(--yellow-bg);border:1px solid var(--yellow)"></span> %Bk/FC ≥ 200%</span>
  <span><span class="dot" style="background:var(--pick-ok)"></span> Pick rớt OK</span>
  <span><span class="dot" style="background:var(--pick-warn)"></span> Pick rớt ≥ 1%</span>
  <span><span class="dot" style="background:var(--pick-bad)"></span> Pick rớt ≥ 5%</span>
  <span style="color:var(--label-cat)">■</span><span style="margin-left:-4px"> Chữ loại hàng</span>
  <span style="color:var(--num-hi)">■</span><span style="margin-left:-4px"> Số liệu</span>
</div>

<div id="warning-section"></div>

<script>
// === DATA ===
// Format per category: [sku_bk,sku_tx,sku_pick, item_bk,item_fc,item_pct,item_tx,item_pick, kg_bk,kg_fc,kg_pct,kg_tx,kg_pick]
// Summary ts:[bk,tx,pick]  ti:[bk,fc,pct,tx,pick]  tQ/tL:[bk,fc,pct,qclh,tx,pick]  tk:[bk,fc,pct,tx,pick]
// dong/mat: same 13-value format as categories

const D = [
{d:'1-Apr',w:'Mon',wk:'W1',

// === HELPERS ===
let curIdx = D.length - 1; // Start at last day with data
let currentTab = 'xuat';
let nhapIdx = 0; // Will be set after DN is defined

function fmt(n) {
  if (n===0||n===null||n===undefined||!isFinite(n)) return '—';
  return Math.round(n).toLocaleString('en-US');
}
function fmtD(n,d) { return (n===0||!isFinite(n))?'—':n.toFixed(d||0); }

function bkTon(tx, pick) {
  if(tx===0) return 0;
  if(pick>=100) return 0;
  if(pick===0) return tx;
  return Math.round(tx / (1 - pick/100));
}

function pctCls(v) {
  if(v > 115 || (v > 0 && v < 85)) return 'pct-warn';
  return 'pct-normal';
}

function pickCls(v) {
  const a = Math.abs(v);
  if(a > 1) return 'pick-warn';
  return 'pick-ok';
}

function fmtPick(v) {
  const cls = pickCls(v);
  const txt = v !== 0 ? fmtD(v,2)+'%' : '0.00%';
  return `<span class="${cls}">${txt}</span>`;
}

// Render a category row group (3 rows: SKU, ITEM, kg)

  const cls1 = isFirst ? ' class="cat-first"' : '';

  return `
  <tr${cls1}>
    <td class="c-cat" rowspan="3">${label}</td>
    <td class="c-info">Số lượng SKU</td>
    <td class="c-bk">${fmt(c[0])}</td><td class="c-fc c-empty"></td><td class="c-pct c-empty"></td><td class="c-ql c-empty"></td>

// Compute Table 2 derived categories
function computeT2(day) {
  const q=day.qc, m=day.mat, tqc=day.tqc, tlh=day.tlh;
  // tcnk combined = tqc + tlh
  const tcnk = [];
  for(let i=0;i<13;i++) {
    if(i===5 || i===10) { // pct fields - recompute
      const bk = tqc[i-2]+tlh[i-2];
      const fc = tqc[i-1]+tlh[i-1];
      tcnk[i] = fc>0 ? Math.round(bk/fc*10000)/100 : 0;
    } else {
      tcnk[i] = tqc[i]+tlh[i];
    }
  }
  // matLH = mat - qc (matQC = qc)
  const matLH = [];
  for(let i=0;i<13;i++) {
    if(i===5 || i===10) { // pct - recompute
      const bk = m[i-2]-q[i-2];
      const fc = m[i-1]-q[i-1];
      matLH[i] = fc>0 ? Math.round(bk/fc*10000)/100 : 0;
    } else if(i===2 || i===7 || i===12) { // pick - recompute
      const tx = m[i-1]-q[i-1];
      const bt = bkTon(tx, 0); // will compute later via rendering
      // Actually pick = (bkTon-tx)/bkTon, hard to compute without bkTon
      // Let's just compute from mat/qc bkTon difference
      const m_bt = bkTon(m[i-1], m[i]);
      const q_bt = bkTon(q[i-1], q[i]);
      const lh_bt = m_bt - q_bt;
      const lh_tx = m[i-1] - q[i-1];
      matLH[i] = lh_bt > 0 ? Math.round((lh_bt-lh_tx)/lh_bt*10000)/100 : 0;
    } else {
      matLH[i] = m[i]-q[i];
    }
  }
  return { tcnk, matQC:q, matLH, tcnkLH:tlh, tcnkQC:tqc };
}

function prev() {

function next() {

}

const WARN_EXCLUDE = ['9300658407505'];

renderWarning();

function renderWarning() {
  // Aggregate: code -> { name, cat, entries:[{date, bk, sx, diff}] }
  const codeMap = {};
  for (const [dateKey, dayData] of Object.entries(CT)) {
    dayData.items.forEach(it => {
      if (WARN_EXCLUDE.includes(it.code)) return;
      if (!codeMap[it.code]) {
        codeMap[it.code] = { name:it.name, cat:it.cat, entries:[] };
      }
      codeMap[it.code].entries.push({ date:dateKey, bk:it.bk, sx:it.sx, diff:it.diff });
    });
  }

  // Filter codes with >= 3 days
  const warns = Object.entries(codeMap)
    .filter(([_, v]) => v.entries.length >= 3)
    .sort((a,b) => b[1].entries.length - a[1].entries.length || 
      b[1].entries.reduce((s,e)=>s+e.diff,0) - a[1].entries.reduce((s,e)=>s+e.diff,0));

  const el = document.getElementById('warning-section');
  if (warns.length === 0) {
    el.innerHTML = '';
    return;
  }

  let html = `
  <div class="table-block warn-block" style="animation:fadeIn 0.3s ease">
    <div class="warn-title-bar">⚠️ Bảng 4 — Warning: SKU pick rớt lặp lại ≥ 3 ngày<span class="warn-badge">${warns.length} SKU</span></div>
    <table class="warn-table">
      <thead><tr>
        <th>#</th>
        <th class="wt-code">Code</th>
        <th class="wt-name">Tên sản phẩm</th>
        <th class="wt-cat">Loại hàng</th>
        <th class="wt-days">Số ngày</th>
        <th class="wt-num">Ngày</th>
        <th class="wt-num">Booking</th>
        <th class="wt-num">Số Xuất</th>
        <th class="wt-num">SL rớt</th>
      </tr></thead><tbody>`;

  warns.forEach(([code, v], idx) => {
    const n = v.entries.length;
    const daysCls = n >= 5 ? 'wc-days-5' : n >= 4 ? 'wc-days-4' : 'wc-days-3';
    v.entries.forEach((e, i) => {
      html += `<tr${i === 0 ? ' class="warn-group-first"' : ''}>`;
      if (i === 0) {
        html += `
          <td rowspan="${n}">${idx+1}</td>
          <td class="wc-code" rowspan="${n}">${code}</td>
          <td class="wc-name" rowspan="${n}">${v.name}</td>
          <td class="wc-cat" rowspan="${n}">${v.cat}</td>
          <td class="wc-days ${daysCls}" rowspan="${n}">${n}</td>`;
      }
      html += `
          <td class="wc-dates">${e.date}</td>
          <td class="wc-num">${fmt(e.bk)}</td>
          <td class="wc-num">${fmt(e.sx)}</td>
          <td class="wc-num">${fmt(e.diff)}</td>
        </tr>`;
    });
  });

  html += `</tbody></table></div>`;
  el.innerHTML = html;
}

  const colors = {xuat:'#ef4444',nhap:'#f59e0b',dapung:'#10b981'};
  document.getElementById('headerSub').textContent = labels[tab];
  document.getElementById('headerSub').style.color = colors[tab];
  document.getElementById('warning-section').style.display = tab==='xuat' ? '' : 'none';
  document.querySelector('.legend').style.display = tab==='xuat' ? '' : 'none';
  if (tab === 'xuat') { render(); }
  else if (tab === 'nhap') { renderNhap(); }
  else { renderDapUng(); }
}

// Nhap: row helper [bk, tn] -> formatted row
function nhRow(label, bk, tn, isFirst, ncc) {
  const cls = isFirst ? ' class="cat-first"' : '';
  const pct = bk > 0 ? ((bk-tn)/bk*100) : 0;
  const pctTxt = bk > 0 ? pct.toFixed(2)+'%' : '—';
  const pCls = pct > 1 ? 'pick-warn' : 'pick-ok';
  if (ncc !== undefined) {
    // NCC row - single value, no tn
    return `<tr${cls}><td class="c-info" style="padding-left:16px">Số lượng NCC</td><td class="c-bk">${fmt(ncc)}</td><td class="c-tx"></td><td class="c-pk"></td></tr>`;
  }
  return `<tr${cls}><td class="c-info" style="padding-left:16px">${label}</td><td class="c-bk">${fmt(bk)}</td><td class="c-tx">${fmt(tn)}</td><td class="c-pk ${pCls}">${pctTxt}</td></tr>`;
}

function nhCatBlock(catLabel, arr, nccVal, isFirst) {
  // arr = [sku_bk, sku_tn, item_bk, item_tn, kg_bk, kg_tn]
  let h = `<tr${isFirst?' class="cat-first"':''}>
    <td class="c-cat" rowspan="4">${catLabel}</td>`;
  // NCC row
  h += `<td class="c-info">Số lượng NCC</td><td class="c-bk">${fmt(nccVal)}</td><td class="c-tx c-empty"></td><td class="c-pk c-empty"></td></tr>`;
  // SKU
  const skuPct = arr[0]>0 ? ((arr[0]-arr[1])/arr[0]*100) : 0;
  h += `<tr><td class="c-info">Số lượng SKU</td><td class="c-bk">${fmt(arr[0])}</td><td class="c-tx">${fmt(arr[1])}</td><td class="c-pk ${skuPct>1?'pick-warn':'pick-ok'}">${arr[0]>0?skuPct.toFixed(2)+'%':'0.00%'}</td></tr>`;
  // ITEM
  const iPct = arr[2]>0 ? ((arr[2]-arr[3])/arr[2]*100) : 0;
  h += `<tr class="row-2"><td class="c-info">Số lượng (ITEM)</td><td class="c-bk">${fmt(arr[2])}</td><td class="c-tx">${fmt(arr[3])}</td><td class="c-pk ${iPct>1?'pick-warn':'pick-ok'}">${arr[2]>0?iPct.toFixed(2)+'%':'0.00%'}</td></tr>`;
  // KG
  const kPct = arr[4]>0 ? ((arr[4]-arr[5])/arr[4]*100) : 0;
  h += `<tr class="row-3"><td class="c-info">Trọng lượng (kg)</td><td class="c-bk">${fmt(arr[4])}</td><td class="c-tx">${fmt(arr[5])}</td><td class="c-pk ${kPct>1?'pick-warn':'pick-ok'}">${arr[4]>0?kPct.toFixed(2)+'%':'0.00%'}</td></tr>`;
  return h;
}

function nhTableHead(day) {
  return `<colgroup>
    <col style="width:110px"><col style="width:120px">
    <col style="width:90px"><col style="width:90px"><col style="width:90px">
  </colgroup>
  <thead><tr><th class="h-cat" colspan="2"></th><th class="date-head" colspan="3">${day.d} — ${day.w}</th></tr>
  <tr><th class="h-cat">Loại hàng</th><th class="h-info">Thông tin</th><th>Booking</th><th>Thực nhập</th><th>Tỉ lệ pick rớt</th></tr></thead>`;
}

function renderNhap() {
  const day = DN[nhapIdx];

  // Summary cards above tables
  const tiPct = day.ti[0]>0 ? ((day.ti[0]-day.ti[1])/day.ti[0]*100) : 0;

    <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">

    </div>
  </div>

  <div class="table-block nh-compact"><div class="table-title" style="color:#f59e0b">📥 Bảng 1 — Nhập hàng theo loại vận chuyển</div>
    <table>${nhTableHead(day)}<tbody>
    ${nhCatBlock('Hàng Quá Cảnh', day.qc, day.qcN, true)}

  // Bảng 2
  html += `<div class="table-block nh-compact"><div class="table-title" style="color:#f59e0b">🌡️ Bảng 2 — Nhập hàng theo Đông / Mát</div>

    </tbody></table></div>`;

  document.getElementById('content').innerHTML = html;
}
