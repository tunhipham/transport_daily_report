# ═══════════════════════════════════════════════════════════
# Auto-approve PRs that ONLY touch WHITELISTED external files
# ═══════════════════════════════════════════════════════════
# Whitelist cứng: chỉ 2 file được auto-approve.
# Dùng commit-based check: chỉ kiểm tra file trong commit
# của PR, KHÔNG bị ảnh hưởng khi main thay đổi.
# ═══════════════════════════════════════════════════════════

name: Auto-approve external PRs

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  contents: write

jobs:
  check-and-approve:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login != 'tunhipham'

    steps:
      - name: Check files in PR commits (drift-proof)
        id: changed
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request.number;

            // ── Lấy danh sách commits trong PR ──
            const commits = await github.rest.pulls.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr,
              per_page: 100
            });

            // ── Lấy files từ TỪNG commit, BỎ QUA merge commits ──
            const touchedFiles = new Set();
            let skippedMerges = 0;
            for (const c of commits.data) {
              // Merge commits có >= 2 parents → skip (chúng mang file từ main)
              if (c.parents && c.parents.length >= 2) {
                skippedMerges++;
                console.log(`⏭ Skip merge commit: ${c.sha.slice(0,7)} — ${c.commit.message.split('\n')[0]}`);
                continue;
              }

              const detail = await github.rest.repos.getCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: c.sha,
              });
              for (const f of detail.data.files) {
                touchedFiles.add(f.filename);
              }
            }

            const changedFiles = [...touchedFiles];

            // ── WHITELIST CỨNG — chỉ 2 file này được auto-approve ──
            const WHITELIST = [
              'docs/external/nhap_xuat_dm.html',
              'docs/external/claim_aba.html'
            ];

            const allWhitelisted = changedFiles.every(f => WHITELIST.includes(f));
            const hasUnknown = changedFiles.some(f => !WHITELIST.includes(f));

            core.setOutput('files', JSON.stringify(changedFiles));
            core.setOutput('count', changedFiles.length);
            core.setOutput('all_whitelisted', allWhitelisted.toString());
            core.setOutput('has_unknown', hasUnknown.toString());

            console.log(`PR #${pr} — ${commits.data.length} commits (${skippedMerges} merge skipped)`);
            console.log(`Files touched: ${changedFiles.join(', ')}`);
            console.log(`All whitelisted: ${allWhitelisted}`);
            console.log(`Has unknown files: ${hasUnknown}`);

      - name: Block if any file outside whitelist
        if: steps.changed.outputs.has_unknown == 'true'
        run: |
          echo "🚨 ════════════════════════════════════════════"
          echo "🚨  BLOCK — PR chứa file NGOÀI whitelist!"
          echo "🚨 ════════════════════════════════════════════"
          echo ""
          echo "Files trong PR commits:"
          echo '${{ steps.changed.outputs.files }}' | python3 -c "import sys,json; [print(f'  → {f}') for f in json.loads(sys.stdin.read())]"
          echo ""
          echo "Chỉ các file sau được auto-approve:"
          echo "  ✅ docs/external/nhap_xuat_dm.html"
          echo "  ✅ docs/external/claim_aba.html"
          echo ""
          echo "⚠ PR này cần review thủ công từ @tunhipham"
          exit 1

      - name: Auto-approve whitelisted files only
        if: steps.changed.outputs.all_whitelisted == 'true'
        uses: hmarr/auto-approve-action@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout repo (needed for gh CLI)
        if: steps.changed.outputs.all_whitelisted == 'true'
        uses: actions/checkout@v4

      - name: Auto-merge
        if: steps.changed.outputs.all_whitelisted == 'true'
        run: gh pr merge ${{ github.event.pull_request.number }} --squash --auto
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
