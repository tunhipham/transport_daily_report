# ═══════════════════════════════════════════════════════════
# Auto-approve PRs that ONLY touch WHITELISTED external files
# ═══════════════════════════════════════════════════════════
# WHITELIST CỨNG: chỉ 2 file dưới đây được auto-approve.
# ─────────────────────────────────────────────────────────
# ✅ Update dữ liệu 2 file cũ → auto-approve + auto-merge
# ❌ Thêm file MỚI hoặc sửa file khác → BLOCK + ping owner
# ═══════════════════════════════════════════════════════════

name: Auto-approve external PRs

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  contents: write

jobs:
  check-and-approve:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login != 'tunhipham'

    steps:
      - name: Check files in PR commits (drift-proof)
        id: changed
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request.number;

            // ── Lấy danh sách commits trong PR ──
            const commits = await github.rest.pulls.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr,
              per_page: 100
            });

            // ── Lấy files từ TỪNG commit, BỎ QUA merge commits ──
            const touchedFiles = new Set();
            let skippedMerges = 0;
            for (const c of commits.data) {
              // Merge commits có >= 2 parents → skip (chúng mang file từ main)
              if (c.parents && c.parents.length >= 2) {
                skippedMerges++;
                console.log(`⏭ Skip merge commit: ${c.sha.slice(0,7)} — ${c.commit.message.split('\n')[0]}`);
                continue;
              }

              const detail = await github.rest.repos.getCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: c.sha,
              });
              for (const f of detail.data.files) {
                touchedFiles.add(f.filename);
              }
            }

            const changedFiles = [...touchedFiles];

            // ── WHITELIST CỨNG — chỉ 2 file này được auto-approve ──
            const WHITELIST = [
              'docs/external/nhap_xuat_dm.html',
              'docs/external/claim_aba.html'
            ];

            const allWhitelisted = changedFiles.every(f => WHITELIST.includes(f));
            const hasUnknown = changedFiles.some(f => !WHITELIST.includes(f));
            const unknownFiles = changedFiles.filter(f => !WHITELIST.includes(f));

            core.setOutput('files', JSON.stringify(changedFiles));
            core.setOutput('unknown_files', JSON.stringify(unknownFiles));
            core.setOutput('count', changedFiles.length);
            core.setOutput('all_whitelisted', allWhitelisted.toString());
            core.setOutput('has_unknown', hasUnknown.toString());

            console.log(`PR #${pr} — ${commits.data.length} commits (${skippedMerges} merge skipped)`);
            console.log(`Files touched: ${changedFiles.join(', ')}`);
            console.log(`All whitelisted: ${allWhitelisted}`);
            console.log(`Has unknown files: ${hasUnknown}`);
            if (unknownFiles.length > 0) {
              console.log(`Unknown files: ${unknownFiles.join(', ')}`);
            }

      # ── BLOCK: file ngoài whitelist → comment + fail ──
      - name: Post review-request comment
        if: steps.changed.outputs.has_unknown == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request.number;
            const unknownFiles = JSON.parse('${{ steps.changed.outputs.unknown_files }}');
            const allFiles = JSON.parse('${{ steps.changed.outputs.files }}');

            const fileList = unknownFiles.map(f => `  ❌ \`${f}\``).join('\n');
            const whitelistedInPR = allFiles.filter(f =>
              ['docs/external/nhap_xuat_dm.html', 'docs/external/claim_aba.html'].includes(f)
            ).map(f => `  ✅ \`${f}\``).join('\n');

            const body = [
              '## 🚨 PR cần review thủ công từ @tunhipham',
              '',
              'PR này chứa file **ngoài whitelist** — không thể auto-merge.',
              '',
              '### File ngoài whitelist (cần duyệt):',
              fileList,
              '',
              whitelistedInPR ? `### File trong whitelist (OK):\n${whitelistedInPR}\n` : '',
              '### Whitelist hiện tại:',
              '  ✅ `docs/external/nhap_xuat_dm.html`',
              '  ✅ `docs/external/claim_aba.html`',
              '',
              '---',
              '> 💡 Nếu bạn muốn thêm tab mới trên dashboard, @tunhipham cần review và merge thủ công.',
              '> Nếu chỉ update dữ liệu cho 2 file trên → tách riêng PR chỉ chứa 2 file đó để auto-merge.'
            ].join('\n');

            // Check if we already posted this comment (avoid spam on synchronize)
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
              per_page: 50
            });
            const alreadyPosted = comments.data.some(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('PR cần review thủ công')
            );
            if (!alreadyPosted) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr,
                body: body
              });
            }

            // Also request review from tunhipham
            try {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr,
                reviewers: ['tunhipham']
              });
            } catch (e) {
              console.log('Could not request review:', e.message);
            }

      - name: Fail check for non-whitelisted files
        if: steps.changed.outputs.has_unknown == 'true'
        run: |
          echo "🚨 ════════════════════════════════════════════"
          echo "🚨  BLOCK — PR chứa file NGOÀI whitelist!"
          echo "🚨 ════════════════════════════════════════════"
          echo ""
          echo "Files ngoài whitelist:"
          echo '${{ steps.changed.outputs.unknown_files }}' | python3 -c "import sys,json; [print(f'  ❌ {f}') for f in json.loads(sys.stdin.read())]"
          echo ""
          echo "⚠ PR này cần review thủ công từ @tunhipham"
          echo "  → Đã tự động tag @tunhipham trên PR"
          exit 1

      # ── PASS: chỉ whitelisted files → auto-approve + auto-merge ──
      - name: Auto-approve whitelisted files
        if: steps.changed.outputs.all_whitelisted == 'true'
        uses: hmarr/auto-approve-action@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          review-message: "✅ Auto-approved — chỉ update dữ liệu trong whitelist (${{ steps.changed.outputs.count }} files)."

      - name: Checkout repo (needed for gh CLI)
        if: steps.changed.outputs.all_whitelisted == 'true'
        uses: actions/checkout@v4

      - name: Auto-merge
        if: steps.changed.outputs.all_whitelisted == 'true'
        run: |
          echo "✅ Auto-merging PR #${{ github.event.pull_request.number }}..."
          gh pr merge ${{ github.event.pull_request.number }} --squash --auto
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
